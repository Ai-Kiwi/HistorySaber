<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electric Border Demo</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #111;
    font-family: sans-serif;
  }

  .electric-border {
    position: relative;
    padding: 40px 80px;
    border-radius: 16px;
    background: #111;
    color: #0ff;
    font-size: 24px;
    font-weight: bold;
    overflow: hidden;
    text-align: center;
  }

  /* Pseudo-element for animated electric border */
  .electric-border::before {
    content: "";
    position: absolute;
    inset: 0;
    padding: 4px; /* border thickness */
    border-radius: inherit;
    background: linear-gradient(
      90deg,
      #0ff 25%,
      transparent 50%,
      #0ff 75%
    );
    background-size: 200% 100%;
    -webkit-mask: 
      linear-gradient(#fff 0 0) content-box, 
      linear-gradient(#fff 0 0);
    -webkit-mask-composite: destination-out;
    mask-composite: exclude;
    animation: charge 1s linear infinite;
  }

  @keyframes charge {
    0% { background-position: 0 0; }
    100% { background-position: 200% 0; }
  }
</style>
</head>
<body>

<div class="electric-border">
  ⚡ ELECTRIC BORDER ⚡
</div>

</body>
</html>
